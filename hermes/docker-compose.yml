# KAI Asset Forge — Hermes Agent Fleet
# Run: docker compose --profile full build
#       docker compose --profile full up -d
# Stop: docker compose --profile full down
# Status: docker compose --profile full ps

services:
  # ─── Central Orchestrator ───
  kai-orchestrator:
    build: .
    container_name: kai-orchestrator
    volumes:
      - ./task-bus:/srv/agent-bus
    environment:
      - ROLE=orchestrator
      - KAI_API_BASE=${KAI_API_BASE:-https://kai-asset-forge-hub.vercel.app}
      - KAI_API_TOKEN=${KAI_API_TOKEN}
      - POLL_SECONDS=10
      - HEARTBEAT_MINUTES=30
    restart: unless-stopped
    profiles: [full]

  # ─── Sales: Lister ───
  lister:
    build: .
    container_name: kai-lister
    volumes:
      - ./task-bus:/srv/agent-bus
    environment:
      - ROLE=lister
      - KAI_API_BASE=${KAI_API_BASE:-https://kai-asset-forge-hub.vercel.app}
      - KAI_API_TOKEN=${KAI_API_TOKEN}
      - POLL_SECONDS=10
    restart: unless-stopped
    profiles: [full]

  # ─── Ops: Monitor ───
  monitor:
    image: alpine:latest
    container_name: kai-monitor
    command: >
      sh -c '
        apk add --no-cache curl jq;
        while true; do
          echo "[$$(date -Iseconds)] Checking health..." > /srv/agent-bus/ops/outbox/status.md;
          curl -s -H "Authorization: Bearer $$KAI_API_TOKEN" "$$KAI_API_BASE/api/agents/health" |
            jq . > /srv/agent-bus/ops/outbox/health-$$(date +%H%M).json 2>/dev/null;
          sleep 300;
        done
      '
    volumes:
      - ./task-bus/ops:/srv/agent-bus/ops
    environment:
      - KAI_API_BASE=${KAI_API_BASE:-https://kai-asset-forge-hub.vercel.app}
      - KAI_API_TOKEN=${KAI_API_TOKEN}
    restart: unless-stopped
    profiles: [full]
