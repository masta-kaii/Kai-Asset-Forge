# KAI Asset Forge — Hermes Agent Fleet
# Run: docker compose --profile full build
#       docker compose --profile full up -d
# Stop: docker compose --profile full down
# Status: docker compose --profile full ps

services:
  # ─── Central Orchestrator ───
  kai-orchestrator:
    build: .
    container_name: kai-orchestrator
    volumes:
      - ./task-bus:/srv/agent-bus
    environment:
      - ROLE=orchestrator
      - KAI_API_BASE=${KAI_API_BASE:-https://kai-asset-forge-hub.vercel.app}
      - KAI_API_TOKEN=${KAI_API_TOKEN}
      - STATUS_PUSH_SECRET=${STATUS_PUSH_SECRET}
      - POLL_SECONDS=10
      - HEARTBEAT_MINUTES=30
    restart: unless-stopped
    profiles: [full]

  # ─── Sales: Lister ───
  lister:
    build: .
    container_name: kai-lister
    volumes:
      - ./task-bus:/srv/agent-bus
    environment:
      - ROLE=lister
      - KAI_API_BASE=${KAI_API_BASE:-https://kai-asset-forge-hub.vercel.app}
      - KAI_API_TOKEN=${KAI_API_TOKEN}
      - STATUS_PUSH_SECRET=${STATUS_PUSH_SECRET}
      - POLL_SECONDS=10
    restart: unless-stopped
    profiles: [full]

  # ─── Ops: Monitor ───
  # Runs the agent.js monitor role: polls fleet health and pushes a snapshot
  # to /api/status so the dashboard can show liveness and raise a staleness
  # alarm when the fleet goes quiet.
  monitor:
    build: .
    container_name: kai-monitor
    volumes:
      - ./task-bus:/srv/agent-bus
    environment:
      - ROLE=monitor
      - KAI_API_BASE=${KAI_API_BASE:-https://kai-asset-forge-hub.vercel.app}
      - KAI_API_TOKEN=${KAI_API_TOKEN}
      - STATUS_PUSH_SECRET=${STATUS_PUSH_SECRET}
      - MONITOR_MINUTES=5
    restart: unless-stopped
    profiles: [full]
